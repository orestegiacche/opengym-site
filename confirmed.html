<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email confirmed — OpenGym</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0a04;
    --bg2: #1a1208;
    --bg3: #2b200c;
    --border: #3a2e14;
    --orange: #f47c2b;
    --gold: #c8a96e;
    --cream: #f5edd8;
    --muted: #8a7a5a;
    --green: #5d9e3f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(15, 10, 4, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(58, 46, 20, 0.5);
  }

  .nav-logo {
    font-family: 'Anton', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
  }

  .nav-logo span { color: var(--orange); }

  .nav-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    transition: color 0.2s;
  }

  .nav-link:hover { color: var(--cream); }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 40px;
    position: relative;
    overflow: hidden;
  }

  main::before {
    content: '';
    position: absolute;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(244, 124, 43, 0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .confirmed-inner {
    position: relative;
    max-width: 520px;
  }

  .check-circle {
    width: 96px;
    height: 96px;
    margin: 0 auto 32px;
    border-radius: 50%;
    background: rgba(244, 124, 43, 0.12);
    border: 1px solid rgba(244, 124, 43, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .check-circle svg {
    width: 48px;
    height: 48px;
    color: var(--orange);
  }

  h1 {
    font-family: 'Anton', sans-serif;
    font-size: clamp(48px, 8vw, 80px);
    line-height: 1;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  h1 .orange { color: var(--orange); }

  .subtitle {
    font-size: clamp(16px, 2vw, 20px);
    color: var(--muted);
    max-width: 420px;
    margin: 0 auto 40px;
    font-weight: 300;
    line-height: 1.7;
  }

  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }

  .home-link:hover { color: var(--cream); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 40px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  footer a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  footer a:hover { color: var(--cream); }

  .footer-logo {
    font-family: 'Anton', sans-serif;
    font-size: 20px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .footer-logo span { color: var(--orange); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    main { padding: 60px 20px; }
    .check-circle { width: 80px; height: 80px; margin-bottom: 24px; }
    .check-circle svg { width: 40px; height: 40px; }
    footer { padding: 32px 20px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Open<span>Gym</span></div>
  <a href="index.html" class="nav-link">Home</a>
</nav>

<main>
  <div class="confirmed-inner">
    <div class="check-circle" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.5l4.5 4.5L19 7"/>
      </svg>
    </div>
    <h1>Email <span class="orange">confirmed.</span></h1>
    <p class="subtitle">You're all set. Open the OpenGym app to sign in.</p>
    <a href="index.html" class="home-link">← Back to opengym.app</a>
  </div>
</main>

<footer>
  <div class="footer-logo">Open<span>Gym</span></div>
  <p style="margin-bottom:12px;">The world is your gym.</p>
  <p>
    <a href="index.html#privacy">Privacy Policy</a> &nbsp;·&nbsp;
    <a href="mailto:opengym.support@gmail.com">Support</a>
  </p>
  <p style="margin-top:16px;">© 2026 OpenGym. All rights reserved.</p>
</footer>

</body>
</html>
